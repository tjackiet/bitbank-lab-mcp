name: E2E

# E2E は実サブプロセス + tsx + StdioClientTransport を必要とするため
# サンドボックスや GH Actions の一時的な network/process 制約で flaky になりやすい。
# PR ごとには走らせず、手動実行 + 週次スケジュールで回す。
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 18 * * 0' # 毎週日曜 18:00 UTC (= 月曜 03:00 JST)

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate types from Zod schemas
        run: npm run gen:types

      - name: E2E (stdio subprocess)
        run: npm run test:e2e
